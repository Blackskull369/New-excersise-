<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo List</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="container">

    <header>
      <h1>MY TASKS</h1>
      <p class="subtitle">get things done.</p>
    </header>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="add a new task..." maxlength="100" />
      <button id="addBtn">ADD</button>
    </div>

    <div class="stats">
      <span id="totalCount">0 tasks</span>
      <span id="doneCount">0 done</span>
    </div>

    <ul id="taskList"></ul>

    <div class="empty-state" id="emptyState">
      <span>✦</span>
      <p>nothing here yet.<br/>add something above.</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
